<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ExcelMail Bridge</title>
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
</head>

<body>
    <h1>ExcelMail Bridge</h1>

    <button id="login">Iniciar sesión</button>
    <button id="logout">Cerrar sesión</button>

    <h2>Emails:</h2>
    <pre id="output"></pre>

<script>
const msalConfig = {
    auth: {
        clientId: "febd5697-6342-4a56-adfc-393e39a59c73",
        authority: "https://login.microsoftonline.com/consumers",
        redirectUri: "https://perezalejandrocv.github.io/excelmail/"
    },
    cache: {
        cacheLocation: "localStorage"
    }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

const loginRequest = {
    scopes: ["User.Read", "Mail.Read", "Files.ReadWrite.All"]
};

const output = document.getElementById("output");

/* =========================
   TOKEN
========================= */

async function getToken(account) {
    try {
        return await msalInstance.acquireTokenSilent({
            ...loginRequest,
            account
        });
    } catch (e) {
        return await msalInstance.acquireTokenPopup(loginRequest);
    }
}

/* =========================
   HELPERS
========================= */


function formatDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);

    const day = String(d.getDate()).padStart(2, "0");
    const month = String(d.getMonth() + 1).padStart(2, "0");
    const year = d.getFullYear();

    return `${day}/${month}/${year}`;
}


function getSinceISO() {
    const d = new Date();
    d.setDate(d.getDate() - 1); // último día
    return d.toISOString();
}





/* =========================
   GRAPH: PAGINACIÓN REAL
========================= */

async function fetchAllMessages(url, token) {
    let all = [];
    let next = url;

    while (next) {

        const res = await fetch(next, {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        if (!res.ok) {
            console.log("GRAPH ERROR:", await res.text());
            break;
        }

        const data = await res.json();

        all = all.concat(data.value || []);
        next = data["@odata.nextLink"] || null;
    }

    return all;
}

/* =========================
   CARPETAS
========================= */

async function getFolders(token) {
    const res = await fetch("https://graph.microsoft.com/v1.0/me/mailFolders", {
        headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();
    return data.value;
}

/* =========================
   EMAILS POR CARPETA (SIN LÍMITE)
========================= */

async function getEmailsFromFolder(token, folderId, folderName) {

    const since = getSinceISO();

    const url =
    `https://graph.microsoft.com/v1.0/me/mailFolders/${folderId}/messages` +
    `?$select=subject,from,receivedDateTime,body,webLink` +
    `&$filter=receivedDateTime ge ${since}`;

    const messages = await fetchAllMessages(url, token);

    return messages.map(mail => ([
        formatDate(mail.receivedDateTime),
        mail.from?.emailAddress?.address || "",
        mail.subject || "",
        folderName,
        mail.body?.content || ""
    ]));
}

/* =========================
   TODAS LAS CARPETAS
========================= */

async function loadAllFoldersEmails(token) {

    const folders = await fetchAllFolders(token);

    let allRows = [];   // <- IMPORTANTE

    for (const folder of folders) {

        const rows = await getEmailsFromFolder(
            token,
            folder.id,
            folder.displayName
        );

        allRows = allRows.concat(rows);
    }

    output.innerText = `Emails totales: ${allRows.length}`;

    return allRows;
}

/* =========================
   EXCEL
========================= */

async function writeEmailsToExcel(token, emails) {

    const rows = emails;

    const res = await fetch(
        "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook/tables/Tabla1/rows/add",
        {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ values: rows })
        }
    );

    console.log("EXCEL:", res.status, await res.text());
}



async function fetchAllFolders(token) {
    let url = "https://graph.microsoft.com/v1.0/me/mailFolders?$top=50";
    let all = [];

    while (url) {
        const res = await fetch(url, {
            headers: { Authorization: "Bearer " + token }
        });

        const data = await res.json();

        all = all.concat(data.value || []);
        url = data["@odata.nextLink"];
    }

    return all;
}





/* =========================
   LOGIN
========================= */

document.getElementById("login").onclick = async () => {
    try {

        const loginResponse = await msalInstance.loginPopup(loginRequest);
        const account = loginResponse.account;

        msalInstance.setActiveAccount(account);

        const tokenResponse = await getToken(account);

        output.innerText = "Descargando emails...";

        const allRows = await loadAllFoldersEmails(tokenResponse.accessToken);

        output.innerText = `Total emails: ${allRows.length}\nEnviando a Excel...`;

        await writeEmailsToExcel(tokenResponse.accessToken, allRows);

        output.innerText += "\n\nSincronización completada ✔";

    } catch (err) {
        console.error(err);
        output.innerText = "Error: " + err.message;
    }
};

/* =========================
   LOGOUT
========================= */

document.getElementById("logout").onclick = () => {
    msalInstance.logoutPopup();
};
</script>

</body>
</html>
