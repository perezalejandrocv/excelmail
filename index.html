<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ExcelMail Bridge</title>
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
</head>

<body>
    <h1>ExcelMail Bridge</h1>

    <button id="login">Iniciar sesión</button>
    <button id="logout">Cerrar sesión</button>

    <h2>Emails:</h2>
    <pre id="output"></pre>

    <script>
        const msalConfig = {
            auth: {
                clientId: "febd5697-6342-4a56-adfc-393e39a59c73",
                authority: "https://login.microsoftonline.com/consumers",
                redirectUri: "https://perezalejandrocv.github.io/excelmail/"
            },
            cache: {
                cacheLocation: "localStorage"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        const loginRequest = { scopes: [ "User.Read", "Mail.Read", "Files.ReadWrite.All" ] };

        const output = document.getElementById("output");

        async function getToken(account) {
            return await msalInstance.acquireTokenSilent({
                ...loginRequest,
                account: account
            });
        }

async function loadEmails(token) {

    const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/messages?$top=10&$select=subject,from,receivedDateTime,bodyPreview,parentFolderId",
        {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        }
    );

    if (!response.ok) {
        const error = await response.text();
        console.log("GRAPH ERROR:", error);
        return [];
    }

    const data = await response.json();

    let text = "";

    data.value.forEach((mail, i) => {
        text += `\n--- EMAIL ${i + 1} ---\n`;
        text += `Asunto: ${mail.subject}\n`;
        text += `De: ${mail.from?.emailAddress?.address}\n`;
        text += `Fecha: ${mail.receivedDateTime}\n`;
    });

    output.innerText = text;

    return data.value; // 👈 IMPORTANTE para Excel
}


async function testWorkbook(token) {

    const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook",
        {
            headers: {
                Authorization: "Bearer " + token
            }
        }
    );

    console.log("WORKBOOK STATUS:", response.status);

    const text = await response.text();
    console.log("WORKBOOK RESPONSE:", text);
}

async function testWorksheets(token) {

    const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook/worksheets",
        {
            headers: {
                Authorization: "Bearer " + token
            }
        }
    );

    console.log("WORKSHEETS STATUS:", response.status);

    const text = await response.text();

    console.log("WORKSHEETS RESPONSE:", text);
}



async function testDrive(token) {

    const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/drive",
        {
            headers: {
                Authorization: `Bearer ${token}`
            }
        }
    );

    console.log("DRIVE STATUS:", response.status);

    const text = await response.text();

    console.log("DRIVE RESPONSE:", text);
}


async function writeEmailsToExcel(token, emails) {

    const rows = emails.map(mail => ([
        mail.receivedDateTime || "",
        mail.from?.emailAddress?.address || "",
        mail.subject || "",
        mail.parentFolderId || "",
        mail.bodyPreview || ""
    ]));

    const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook/tables/Tabla1/rows/add",
        {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                values: rows
            })
        }
    );

    const text = await response.text();

    console.log("EXCEL RESPONSE:", response.status, text);
}

















async function writeCell(token) {

    const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook/worksheets('Hoja1')/range(address='A1')",
        {
            method: "PATCH",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                values: [["PRUEBA GRAPH"]]
            })
        }
    );

    console.log("WRITE CELL STATUS:", response.status);

    const text = await response.text();

    console.log("WRITE CELL RESPONSE:", text);
}






document.getElementById("login").onclick = async () => {
    try {
        const loginResponse = await msalInstance.loginPopup(loginRequest);

        const account = loginResponse.account;
        msalInstance.setActiveAccount(account);

        const tokenResponse = await getToken(account);

        console.log("LOGIN OK");

        output.innerText = "Cargando emails...";

        // 1. leer emails
        const emails = await loadEmails(tokenResponse.accessToken);

        console.log("EMAILS CARGADOS:", emails?.length);

        await writeEmailsToExcel(tokenResponse.accessToken, emails);


        output.innerText += "\n\nSincronización completada ✔";

    } catch (err) {
        console.error(err);
        output.innerText = "Error: " + err.message;
    }
};

        document.getElementById("logout").onclick = () => {
            msalInstance.logoutPopup();
        };
    </script>
</body>
</html>
