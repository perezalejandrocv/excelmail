<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ExcelMail Bridge</title>
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
</head>

<body>
    <h1>ExcelMail Bridge</h1>

    <button id="login">Iniciar sesión</button>
    <button id="logout">Cerrar sesión</button>

    <h2>Emails:</h2>
    <pre id="output"></pre>

<script>
const msalConfig = {
    auth: {
        clientId: "febd5697-6342-4a56-adfc-393e39a59c73",
        authority: "https://login.microsoftonline.com/consumers",
        redirectUri: "https://perezalejandrocv.github.io/excelmail/"
    },
    cache: {
        cacheLocation: "localStorage"
    }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

const loginRequest = {
    scopes: ["User.Read", "Mail.Read", "Files.ReadWrite.All"]
};

const output = document.getElementById("output");

async function getToken(account) {
    return msalInstance.acquireTokenSilent({
        ...loginRequest,
        account
    });
}

/* =========================
   HELPERS
========================= */

function formatDate(isoDate) {
    if (!isoDate) return "";
    const date = new Date(isoDate);
    return `${String(date.getDate()).padStart(2,"0")}/${String(date.getMonth()+1).padStart(2,"0")}/${date.getFullYear()}`;
}

function stripHtml(html) {
    if (!html) return "";
    return html.replace(/<[^>]*>/g, "");
}

/* =========================
   LOAD EMAILS (GRAPH)
========================= */

async function loadEmails(token) {

    const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$top=10&$select=subject,from,receivedDateTime,bodyPreview,parentFolderId,body",
        {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        }
    );

    if (!response.ok) {
        console.log("GRAPH ERROR:", await response.text());
        return [];
    }

    const data = await response.json();

    let text = "";

    data.value.forEach((mail, i) => {
        text += `\n--- EMAIL ${i + 1} ---\n`;
        text += `Asunto: ${mail.subject}\n`;
        text += `De: ${mail.from?.emailAddress?.address}\n`;
        text += `Fecha: ${formatDate(mail.receivedDateTime)}\n`;
        text += `Preview: ${mail.bodyPreview}\n`;
    });

    output.innerText = text;

    return data.value;
}

/* =========================
   WRITE TO EXCEL
========================= */

async function writeEmailsToExcel(token, emails) {

    const rows = emails.map(mail => ([
        formatDate(mail.receivedDateTime),
        mail.from?.emailAddress?.address || "",
        mail.subject || "",
        mail.parentFolderId || "",
        stripHtml(mail.body?.content || mail.bodyPreview || "")
    ]));

    const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook/tables/Tabla1/rows/add",
        {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ values: rows })
        }
    );

    console.log("EXCEL RESPONSE:", response.status, await response.text());
}

/* =========================
   WRITE SINGLE CELL (TEST)
========================= */

async function writeCell(token) {

    const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook/worksheets('Hoja1')/range(address='A1')",
        {
            method: "PATCH",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                values: [["PRUEBA GRAPH"]]
            })
        }
    );

    console.log("WRITE CELL:", response.status, await response.text());
}

/* =========================
   LOGIN FLOW
========================= */

document.getElementById("login").onclick = async () => {
    try {

        const loginResponse = await msalInstance.loginPopup(loginRequest);

        const account = loginResponse.account;
        msalInstance.setActiveAccount(account);

        const tokenResponse = await getToken(account);

        output.innerText = "Cargando emails...";

        const emails = await loadEmails(tokenResponse.accessToken);

        await writeEmailsToExcel(tokenResponse.accessToken, emails);

        output.innerText += "\n\nSincronización completada ✔";

    } catch (err) {
        console.error(err);
        output.innerText = "Error: " + err.message;
    }
};

/* =========================
   LOGOUT
========================= */

document.getElementById("logout").onclick = () => {
    msalInstance.logoutPopup();
};
</script>

</body>
</html>
