<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ExcelMail Bridge</title>
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
</head>

<body>
    <h1>ExcelMail Bridge</h1>

    <button id="login">Iniciar sesión</button>
    <button id="logout">Cerrar sesión</button>

    <h2>Emails:</h2>
    <pre id="output"></pre>

<script>
const msalConfig = {
    auth: {
        clientId: "febd5697-6342-4a56-adfc-393e39a59c73",
        authority: "https://login.microsoftonline.com/consumers",
        redirectUri: "https://perezalejandrocv.github.io/excelmail/"
    },
    cache: {
        cacheLocation: "localStorage"
    }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

const loginRequest = {
    scopes: ["User.Read", "Mail.Read", "Files.ReadWrite"]
};

const output = document.getElementById("output");

async function getToken(account) {
    return await msalInstance.acquireTokenSilent({
        ...loginRequest,
        account
    });
}

//////////////////////////////////////////////////////
// 📧 LEER EMAILS
//////////////////////////////////////////////////////
async function getEmails(token) {
    const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/messages?$top=10",
        {
            headers: {
                Authorization: `Bearer ${token}`
            }
        }
    );

    const data = await response.json();
    return data.value || [];
}

//////////////////////////////////////////////////////
// 📊 ESCRIBIR EN EXCEL (FILAS)
//////////////////////////////////////////////////////
async function writeToExcel(token, rows) {

    const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/drive/root:/EXCELMAIL.xlsx:/workbook/tables/Tabla1/rows/add",
        {
            method: "POST",
            headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                values: rows
            })
        }
    );

    const text = await response.text();
    console.log("EXCEL WRITE:", response.status, text);
}

//////////////////////////////////////////////////////
// 🔁 SYNC PRINCIPAL
//////////////////////////////////////////////////////
async function syncEmails(token) {

    const emails = await getEmails(token);

    const rows = emails.map(mail => [

        // FECHA
        mail.receivedDateTime,

        // CARPETA (Inbox/Sent/etc — en este caso simplificado)
        "Inbox",

        // DE
        mail.from?.emailAddress?.address || "",

        // ASUNTO
        mail.subject || "",

        // CONTENIDO (texto simple)
        mail.body?.content || ""

    ]);

    await writeToExcel(token, rows);

    output.innerText =
        "Sync completado: " + rows.length + " emails añadidos a Excel";
}

//////////////////////////////////////////////////////
// 🔐 LOGIN
//////////////////////////////////////////////////////
document.getElementById("login").onclick = async () => {
    try {
        const loginResponse = await msalInstance.loginPopup(loginRequest);

        const account = loginResponse.account;
        msalInstance.setActiveAccount(account);

        const tokenResponse = await getToken(account);

        output.innerText = "Sincronizando emails...";

        await syncEmails(tokenResponse.accessToken);

    } catch (err) {
        console.error(err);
        output.innerText = "Error: " + err.message;
    }
};

document.getElementById("logout").onclick = () => {
    msalInstance.logoutPopup();
};
</script>

</body>
</html>
